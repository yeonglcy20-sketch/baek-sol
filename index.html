<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>백솔 업보리스트</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="petal p1">✦</div><div class="petal p2">♡</div><div class="petal p3">✧</div><div class="petal p4">✿</div>

  <main class="shell">
    <section class="hero-card">
      <div class="hero-text">
        <p class="mini">BAEKSOL KARMA ARCHIVE</p>
        <h1>백솔 업보리스트</h1>
        <p class="subtitle">백솔의 달콤살벌 업보 기록소</p>
        <div class="hero-buttons">
          <button id="refreshBtn" type="button">새로고침</button>
          <span id="updatedAt">불러오는 중...</span>
        </div>
      </div>
    </section>

    <section class="tool-card">
      <input id="searchInput" type="search" placeholder="닉네임 검색" />
    </section>

    <section class="list-card">
      <div class="section-title">
        <h2>업보 현황</h2>
      </div>
      <div id="list" class="list loading">스프레드시트 데이터를 불러오는 중입니다...</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
